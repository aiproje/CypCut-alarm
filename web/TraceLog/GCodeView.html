<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF8">
    <meta name="viewport" content="width=devicewidth, initialscale=1.0">
    <title>树形菜单</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .time-tree {
            padding-left: 40px !important;
            padding-right:35px;
        }

        .treebox {
            display: flex;
        }

        .tree-container {
            margin-top: 30px;
            width: 200px;
            border-right: 1px solid #dcdcdc;
        }

            .tree-container .name {
                cursor: pointer;
                padding-left: 20px;
                height: 30px;
                display: flex;
                align-items: center;
                font-size: 15px;
            }

                .tree-container .name.active {
                    color: #00A7D0;
                }

            .tree-container .later > .name:before {
                content: '+';
                width: 15px;
                height: 15px;
                display: flex;
                font-size: 15px;
                align-items: center;
                padding-bottom: 5px;
                justify-content: center;
            }

            .tree-container .later > .name.un:before {
                content: '-';
            }

            .tree-container .item {
                padding-left: 20px;
                display: none;
            }

                .tree-container .item.open {
                    display: block;
                }

            .tree-container > .item {
                margin-top: 5px;
            }

        .tree-pitch {
            margin-left: 100px;
            font-size: 15px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="treebox">
        <div class="tree-container" id="costume"></div>
        
        <div class="tree-pitch">
            <div class="time-picker" style="margin-top: 20px; width:800px; height:30px">
                <div class="layui-inline">
                    <label class="layui-form-label">开始时间:</label>
                    <div class="layui-input-inline">
                        <input type="text" class="layui-input" id="start-time-input" placeholder="yyyy-MM-dd HH:mm:ss">
                    </div>
                </div>

                <div class="layui-inline">
                    <label class="layui-form-label">结束时间:</label>
                    <div class="layui-input-inline">
                        <input type="text" class="layui-input" id="end-time-input" placeholder="yyyy-MM-dd HH:mm:ss">
                    </div>
                </div>
                <form class="layui-form" action="" style="display:inline-block; width: 100px; margin-left: 10px">
                    <input type="checkbox" name="" title="左右布局" checked>
                </form>
                    <!--<form class="layui-form" action="">
        <div class="layui-form-item">
            <label class="layui-form-label">单选框</label>
            <div class="layui-input-block">
                <input type="radio" name="sex" value="男" title="男">
                <input type="radio" name="sex" value="女" title="女" checked>
            </div>
        </div>
        </form>-->
            </div>
            
            <div id="graphviz_svg_div" style="top: 300px; margin-top:100px">
                <!-- Target for dynamic svg generation -->
            </div>
        </div>
    </div>
</body>
</html>

<script>
    layui.use('form', function () {
        const form = layui.form;
        form.render();
    });

    layui.use('laydate', function () {
        var laydate = layui.laydate;
        //日期时间选择器
        laydate.render({
            elem: '#start-time-input',
            type: 'datetime'
        });

        laydate.render({
            elem: '#end-time-input'
            , type: 'datetime'
        });
    })
</script>
<script type="text/javascript">
    const tree_con = document.getElementById('costume'); // 获取tree状结构的最外层容器ID

    $(document).ready(function () {
        DrawTreeList();

    })

    function ToTreeData(jsonData) {
        console.log(jsonData);
        var treeData = [];
        for (var key in jsonData) {
            var dataJ = { "value": { "name": key }, "child": [] };
            var valueY = jsonData[key];
            for (var keyD in valueY) {
                var dataD = { "value": { "name": keyD }, "child": [] };
                var timeValue = valueY[keyD];
                for (var dataT in timeValue) {
                    dataD["child"].push({ "value": { "name": timeValue[dataT]["Time"], "ID": timeValue[dataT]["ID"] }, "child": [] })
                }
                dataJ["child"].push(dataD);
            }
            treeData.push(dataJ);
        }
        return treeData;
    }

    function DrawTreeList() {
        $.ajax({
            url: '/instance/log',
            type: 'GET',
            dataType: 'text',
            responseType: 'json',
            success: function (resp) {
                var respJ = JSON.parse(resp);
                var treeData = ToTreeData(respJ.data);
                console.log(treeData);
                createTier(treeData, "")
            },
            error: function (resp, e) {
                console.log(e)
            }
        })
    }

    function createTier(data, spdiv) {  // 创建树  处理函数
        var suprElm = spdiv;   // 根据引用类型的特性 指向被创建好的DOM
        for (const i in data) {   // 开始遍历 树状结构的数据
            const elm_div = document.createElement('div'); // 创建 MOD节点 div
            elm_div.setAttribute('class', 'item');  // 给新建div 取类
            // 对树状结构数据 进行展示
            if (data[i].value.ID == undefined) {
                elm_div.innerHTML = '<div class="name" onclick="cgChildShow(this, 0)">' + data[i].value.name + '</div>';
            } else {
                elm_div.innerHTML = '<div class="name time-tree" treeid="' + data[i].value.ID + '" onclick="cgChildShow(this,\'' + data[i].value.ID + '\')">' + data[i].value.name + '</div>';
            }

            if (suprElm != '') { // 是否  第一次创建
                suprElm.appendChild(elm_div);
            } else {
                $(elm_div).addClass("open");
                tree_con.appendChild(elm_div);
            }

            if (data[i].child.length > 0) { // 如果还有枝干 继续执行本身进行DOM的创建
                $(elm_div).addClass("later");
                createTier(data[i].child, elm_div);
            }
        }

    }
    // 新建DOM节点点击事件 绑定的处理函数
    function cgChildShow(e, name) {
        const nameLm = $(e);  // 点击的当前DOM节点
        const childItem = $(e).siblings('.item');

        if (nameLm.hasClass('active')) {
            $(".name").removeClass('active');
        } else {
            $(".name").removeClass('active');
            nameLm.addClass('active');
            //$(".tree-pitch").html('已选中：' + name);
            if (nameLm.hasClass("time-tree")) {
                var treeId = name;
                UpdateWorkLogGraphviz(treeId);
            }

        }


        if (childItem.hasClass('open')) {
            nameLm.removeClass('un');
            childItem.removeClass("open");
        } else {
            nameLm.addClass('un');
            childItem.addClass("open");
        }
    }


    function UpdateWorkLogGraphviz(instanceLog) {
        console.log($("#start-time-input").val())
        console.log($("#end-time-input").val())
        $.ajax({
            url: '/getLogGV',
            type: 'GET',
            dataType: 'text',
            "data": {
                "InstanceID": instanceLog,
                "StartTime": $("#start-time-input").val(),
                "EndTime": $("#end-time-input").val()
            },
            responseType: 'json',
            success: function (resp) {
                //$("#graphviz_svg_div").html("");
                var respJ = JSON.parse(resp);
                console.log(respJ);
                //InsertGraphvizText(respJ.data);
                UpdateGraphviz(respJ);
            },
            error: function (resp, e) {
                console.log(e)
                svg_div.html("");
                //InsertGraphvizText(JSON.parse(resp).data);
                UpdateGraphviz("");
            }
        })
    }
</script>

<script>
    function UpdateGraphviz(gvData) {
        var content = gvData.data;
        var hoverData = gvData.hover;
        if (content.indexOf("digraph") < 0) {
            content = "digraph G {" + content + "}";
        }
        Viz.instance().then(function (viz) {
            var svg = viz.renderSVGElement(content);
            //console.log(svg)
            //console.log(svg.outerHTML)
            //$('#graphviz_svg_div').html("<hr>" + svg.outerHTML);
            $('#graphviz_svg_div').html("");
            document.getElementById("graphviz_svg_div").appendChild(svg);
            addHover(hoverData);
        });
    }

    function addHover(hoverData) {
		console.log(hoverData);
        if (hoverData != "") {
            console.log(hoverData)
            d3.selectAll('g.node').each(function () {
                d3.select(this).attr("cursor", "pointer");
                let nodeId = d3.select(this).select('title').text();

                //console.log(nodeId)
                d3.select(this).select("title")
                    //.attr("class", "hover-title")
                    .html(hoverData[nodeId]);
                let folderNode = d3.select(this).select("a");
                folderNode.attr("xlink:title", hoverData[nodeId])
                folderNode.attr("target", "_blank")
            })
        }

        // Add hover event listeners to nodes
        d3.selectAll('g.node')
            .on("mouseover", function (event, d) {
                // Highlight the hovered node
                d3.select(this).select('ellipse').classed('hovered-node', true);
            })
            .on("mouseout", function (event, d) {
                // Remove highlight from the hovered node
                d3.select(this).select('ellipse').classed('hovered-node', false);
                d3.selectAll('g.node').select('ellipse').classed('hovered-node-child', false);
                d3.selectAll('g.node').select('ellipse').classed('hovered-node-parent', false);

                // Remove highlight from related edges
                d3.selectAll('g.edge').select('path').classed('hovered-edge-in', false);
                d3.selectAll('g.edge').select('path').classed('hovered-edge-out', false);
            });
    }
</script>
