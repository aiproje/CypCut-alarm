<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>兑换</title>
  <style>
    *{
      padding: 0;
      margin: 0;
    }
    .action{
      width: 100%;
      height: 1080px;
      background: #000;
    }
    .content{
      margin: 0 auto;
      position: relative;
      width: 1440px;
      height: 1080px;
    }

    .action .content .bg{
      width: 100%;
      height: 100%;
    }
    .action .content #qrcode{
      position: absolute;
      left: 625px;
      top: 735px;
    }
  </style>
</head>
<body>
  <div class="action">
    <div class="content">
      <img class="bg" src="../images/bg.png" alt="">
      <div id="qrcode"></div>
    </div>
  </div>
<script src="../js/qrcode.js"></script>
<script>
  var serial = window.location.href.split('=')[1]
  var qrcode = new QRCode(
    document.getElementById("qrcode"),
    { text: serial,
      width: 200,
      height: 200,
      colorDark : "#000000",
      colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.H
    }
  );
</script>
</body>
</html>
